<!DOCTYPE html>
<html>
<head>
    <title>🧮 Sensor Based BMI Calculator</title>

    <!-- ✅ IMPORTANT FOR MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>🧮 Sensor Based BMI Calculator 💪</h2>

        <form>
            <label>📏 Height (cm):</label>
            <input type="number" id="height" placeholder="Auto / Manual 🤖">

            <label>⚖️ Weight (kg):</label>
            <input type="number" id="weight">

            <div class="buttons">
                <button type="button" onclick="calculateBMI()">✨ Calculate BMI</button>
                <button type="reset" onclick="clearResult()">🔄 Reset</button>
            </div>
        </form>

        <p id="bmiResult">📊 BMI:</p>
        <p id="category">🏷️ Category:</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
